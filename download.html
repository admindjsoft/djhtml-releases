<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Downloading DJ HTML Creator...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      max-width: 480px;
      padding: 40px 24px;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: #6c5ce7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 22px; margin-bottom: 12px; }
    p { font-size: 15px; color: #999; line-height: 1.6; }
    a { color: #6c5ce7; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .error { display: none; }
    .error p { color: #e74c3c; }
  </style>
</head>
<body>
  <div class="container">
    <div id="loading">
      <div class="spinner"></div>
      <h1>Preparing your download...</h1>
      <p>DJ HTML Creator will start downloading automatically.<br>If it doesn't, <a id="manual-link" href="https://github.com/admindjsoft/djhtml-releases/releases/latest">click here</a>.</p>
    </div>
    <div id="error" class="error">
      <h1>Download</h1>
      <p>Could not fetch the latest release automatically.</p>
      <p style="margin-top: 16px;"><a href="https://github.com/admindjsoft/djhtml-releases/releases/latest">Download from GitHub Releases</a></p>
    </div>
  </div>
  <script>
    (function() {
      var api = 'https://api.github.com/repos/admindjsoft/djhtml-releases/releases/latest';
      fetch(api)
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var asset = null;
          for (var i = 0; i < data.assets.length; i++) {
            if (data.assets[i].name.match(/\.exe$/i)) {
              asset = data.assets[i];
              break;
            }
          }
          if (asset) {
            document.getElementById('manual-link').href = asset.browser_download_url;
            window.location.href = asset.browser_download_url;
          } else {
            throw new Error('No .exe asset found');
          }
        })
        .catch(function() {
          document.getElementById('loading').style.display = 'none';
          document.getElementById('error').style.display = 'block';
        });
    })();
  </script>
</body>
</html>
