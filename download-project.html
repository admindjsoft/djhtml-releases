<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download Project — DJ HTML Creator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0f;
  color: #e0e0e0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  text-align: center;
  padding: 20px;
}
.container { max-width: 480px; }
.spinner {
  width: 48px; height: 48px;
  border: 4px solid rgba(108,92,231,0.2);
  border-top-color: #6c5ce7;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 24px;
}
@keyframes spin { to { transform: rotate(360deg); } }
h1 { font-size: 22px; margin-bottom: 12px; }
p { font-size: 15px; color: #888; line-height: 1.6; margin-bottom: 16px; }
a { color: #6c5ce7; text-decoration: none; }
a:hover { text-decoration: underline; }
.hidden { display: none; }
.checkmark {
  width: 48px; height: 48px;
  margin: 0 auto 24px;
  color: #00dc82;
}
</style>
</head>
<body>

<div class="container">
  <div id="loading">
    <div class="spinner"></div>
    <h1>Preparing your download...</h1>
    <p>Your project file will start downloading automatically.</p>
  </div>

  <div id="success" class="hidden">
    <svg class="checkmark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    <h1>Your download has started!</h1>
    <p>Check your browser's download bar or Downloads folder.<br>
    <a href="https://djhtmlcreator.com">Back to DJ HTML Creator</a></p>
  </div>

  <div id="error" class="hidden">
    <h1>Download not available</h1>
    <p>The requested project file could not be found.<br>
    <a href="https://djhtmlcreator.com/#projects">Browse all projects</a></p>
  </div>
</div>

<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var file = params.get('file');

  if (!file || !/^[\w\-\.]+\.htmc$/i.test(file)) {
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('error').classList.remove('hidden');
    return;
  }

  var url = 'https://raw.githubusercontent.com/admindjsoft/djhtml-releases/main/projects/' + encodeURIComponent(file);

  // Verify the file exists, then trigger download
  fetch(url, { method: 'HEAD' })
    .then(function(response) {
      if (!response.ok) throw new Error('Not found');
      // File exists — trigger download
      var a = document.createElement('a');
      a.href = url;
      a.download = file;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('success').classList.remove('hidden');
    })
    .catch(function() {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
    });
})();
</script>

</body>
</html>
